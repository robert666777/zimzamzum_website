<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | zimzamzum</title>
  <meta name="description" content="The page you were looking for could not be found.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://zimzamzum.com/404.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0a1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .not-found {
      text-align: center;
      max-width: 500px;
    }
    .not-found h1 {
      font-size: 6rem;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, #6C63FF, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .not-found h2 {
      font-size: 1.5rem;
      margin: 16px 0;
      color: #ccc;
    }
    .not-found p {
      color: #888;
      margin-bottom: 32px;
    }
    .not-found .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: #6C63FF;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .not-found .btn:hover {
      background: #5a52e0;
    }
  </style>
</head>
<body>

  <div class="not-found">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Oops! The page you were looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn">
      ← Back to Home
    </a>
  </div>

</body>
</html>
